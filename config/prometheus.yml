global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: 'testlab'
    environment: 'production'

# Alerting configuration (optional - for Alertmanager)
alerting:
  alertmanagers:
    - static_configs:
        - targets: []

# Load rules once and periodically evaluate them
rule_files:
  # - "alerts.yml"

scrape_configs:
  # Prometheus itself
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # Node Exporter - System metrics
  - job_name: 'node'
    static_configs:
      - targets:
        - 'node-exporter:9100'
        # Add your Proxmox nodes here:
        # - 'proxmox-node1:9100'
        # - 'proxmox-node2:9100'
        labels:
          environment: 'testlab'

  # cAdvisor - Container metrics
  - job_name: 'cadvisor'
    static_configs:
      - targets:
        - 'cadvisor:8080'
        # Add your Proxmox nodes running cAdvisor:
        # - 'proxmox-node1:8080'
        # - 'proxmox-node2:8080'

  # Proxmox Exporter (if using)
  - job_name: 'proxmox'
    static_configs:
      - targets: []
        # - 'proxmox-exporter:9221'
    metrics_path: /pve
    params:
      module: [default]

  # Service-specific exporters
  - job_name: 'pihole'
    static_configs:
      - targets: []
        # - 'pihole:9617'  # Pi-hole Exporter

  - job_name: 'blackbox'
    metrics_path: /probe
    params:
      module: [http_2xx]
    static_configs:
      - targets:
        # Add URLs to monitor
        # - 'http://homeassistant:8123'
        # - 'http://n8n:5678'
        # - 'http://portainer:9000'
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: blackbox-exporter:9115

  # Docker metrics (if using docker-socket-proxy or similar)
  - job_name: 'docker'
    static_configs:
      - targets: []
        # - 'docker-socket-proxy:2375'

# Remote write configuration (optional - for long-term storage)
# remote_write:
#   - url: 'http://victoriametrics:8428/api/v1/write'
